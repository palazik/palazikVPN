name: palazikVPN
options:
  bundleIdPrefix: com.palazik.vpn
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "2.0.2"
    CURRENT_PROJECT_VERSION: "3"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftyXrayKit:
    url: https://github.com/dima-u/SwiftyXrayKit
    from: "2.0.0"

targets:
  palazikVPN:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    # Use the committed Info.plist / entitlements as-is — do NOT let XcodeGen
    # generate them (that would drop NSExtension + the NE/App-Group entitlements).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palazik.vpn
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/palazikVPN.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: PacketTunnel

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - PacketTunnel
      - Shared
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palazik.vpn.PacketTunnel
        INFOPLIST_FILE: PacketTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnel/PacketTunnel.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: SwiftyXrayKit
        product: SwiftyXrayKit
