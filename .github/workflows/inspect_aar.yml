name: Inspect libv2ray AAR

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          curl -fL --retry 3 \
            -o app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.5.3/libv2ray.aar
          echo "AAR size: $(ls -lh app/libs/libv2ray.aar)"

      - name: Extract and inspect classes
        run: |
          mkdir -p /tmp/aar_inspect
          cp app/libs/libv2ray.aar /tmp/aar_inspect/libv2ray.aar
          cd /tmp/aar_inspect

          # List everything in the AAR
          echo "=== AAR CONTENTS ==="
          unzip -l libv2ray.aar

          # Extract classes.jar
          echo ""
          echo "=== ALL CLASSES IN classes.jar ==="
          unzip -p libv2ray.aar classes.jar > classes.jar
          jar tf classes.jar | sort

          # Show V2Ray/libv2ray specific classes
          echo ""
          echo "=== V2RAY RELATED CLASSES ==="
          jar tf classes.jar | grep -i "v2ray\|libv2ray\|xray" | sort

          # Check AndroidManifest for package name
          echo ""
          echo "=== AndroidManifest.xml ==="
          unzip -p libv2ray.aar AndroidManifest.xml | strings | grep -v "^.$" | head -20

          # List any other jars
          echo ""
          echo "=== OTHER JARS ==="
          unzip -l libv2ray.aar | grep "\.jar"

          # Check native libs
          echo ""
          echo "=== NATIVE LIBS ==="
          unzip -l libv2ray.aar | grep "\.so"
