name: 🔍 Inspect libv2ray & Geodata

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download libv2ray.aar
        run: |
          mkdir -p app/libs
          curl -fL -o app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.5.3/libv2ray.aar
          echo "✓ Downloaded libv2ray.aar ($(du -h app/libs/libv2ray.aar | cut -f1))"

      - name: Download geodata files
        run: |
          mkdir -p app/src/main/assets
          curl -fL -o app/src/main/assets/geoip.dat \
            https://github.com/v2fly/geoip/releases/latest/download/geoip.dat
          curl -fL -o app/src/main/assets/geosite.dat \
            https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          echo "✓ geoip.dat: $(du -h app/src/main/assets/geoip.dat | cut -f1)"
          echo "✓ geosite.dat: $(du -h app/src/main/assets/geosite.dat | cut -f1)"

      - name: Extract & inspect libv2ray.aar
        run: |
          mkdir -p inspect/libv2ray
          cd inspect/libv2ray
          unzip -q ../../app/libs/libv2ray.aar
          
          echo "=== 📦 AAR Structure ==="
          find . -type f | sort
          
          echo -e "\n=== 📄 AndroidManifest.xml ==="
          cat AndroidManifest.xml 2>/dev/null || echo "(none)"
          
          echo -e "\n=== 🗂️ classes.jar info ==="
          if [ -f classes.jar ]; then
            echo "Size: $(du -h classes.jar | cut -f1)"
            echo "Entries:"
            unzip -l classes.jar | grep -E "libv2ray|Libv2ray" | head -20
          fi
          
          echo -e "\n=== ⚙️ Libv2ray public methods ==="
          if [ -f classes.jar ]; then
            javap -public -classpath classes.jar libv2ray.Libv2ray 2>&1 || echo "⚠ javap failed"
          fi
          
          echo -e "\n=== 🔎 All init-related methods ==="
          if [ -f classes.jar ]; then
            javap -public -classpath classes.jar libv2ray.Libv2ray 2>/dev/null | grep -i "init\|env\|asset" || echo "(none found)"
          fi

      - name: Verify geodata files
        run: |
          echo "=== 🌍 geoip.dat ==="
          file app/src/main/assets/geoip.dat
          head -c 100 app/src/main/assets/geoip.dat | xxd | head -5
          
          echo -e "\n=== 🌐 geosite.dat ==="
          file app/src/main/assets/geosite.dat
          head -c 100 app/src/main/assets/geosite.dat | xxd | head -5

      - name: Show full Libv2ray class dump
        run: |
          cd inspect/libv2ray
          if [ -f classes.jar ]; then
            echo "### Full Libv2ray class signature" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            javap -v -classpath classes.jar libv2ray.Libv2ray 2>&1 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload inspection artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libv2ray-inspection-results
          path: |
            inspect/
            app/libs/libv2ray.aar
            app/src/main/assets/*.dat
          retention-days: 7

      - name: Print summary
        run: |
          echo "## ✅ Inspection Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the artifact **libv2ray-inspection-results** to see:" >> $GITHUB_STEP_SUMMARY
          echo "- Full AAR structure" >> $GITHUB_STEP_SUMMARY
          echo "- Libv2ray class methods (javap output)" >> $GITHUB_STEP_SUMMARY
          echo "- Geodata file headers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 Look for methods like:" >> $GITHUB_STEP_SUMMARY
          echo "- \`initLibrary(String)\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`InitV2Env(String, String)\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`InitCoreEnv(String)\`" >> $GITHUB_STEP_SUMMARY
          echo "- Any static init methods" >> $GITHUB_STEP_SUMMARY
