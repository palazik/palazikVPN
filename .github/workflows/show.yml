name: Dump Repo Structure & File Contents

on:
  workflow_dispatch:   # run manually from the Actions tab

jobs:
  dump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Print the full directory tree ──────────────────────────────────
      - name: Print directory tree
        run: |
          echo "=============================="
          echo "  DIRECTORY TREE"
          echo "=============================="
          find . \
            -not -path './.git/*' \
            -not -path './gradle/*' \
            -not -path './.gradle/*' \
            -not -path '*/build/*' \
            -not -name '*.class' \
            -not -name '*.jar' \
            -not -name '*.aar' \
            | sort

      # ── 2. Print every text file with its path and content ───────────────
      - name: Print all source files
        run: |
          # Extensions we care about
          EXTS="kt|kts|java|xml|json|yaml|yml|toml|properties|gradle|md|txt|pro|aidl"

          find . \
            -not -path './.git/*' \
            -not -path './gradle/*' \
            -not -path './.gradle/*' \
            -not -path '*/build/*' \
            -type f \
            | grep -E "\.($EXTS)$" \
            | sort \
            | while IFS= read -r file; do
                echo ""
                echo "══════════════════════════════════════════════════════════"
                echo "FILE: $file"
                echo "══════════════════════════════════════════════════════════"
                cat "$file"
                echo ""
              done

      # ── 3. Save everything as a downloadable artifact ────────────────────
      - name: Bundle all source files into one text file
        run: |
          EXTS="kt|kts|java|xml|json|yaml|yml|toml|properties|gradle|md|txt|pro|aidl"
          OUTPUT="repo_dump.txt"

          echo "REPO DUMP — $(date -u)" > "$OUTPUT"
          echo "" >> "$OUTPUT"

          echo "==============================" >> "$OUTPUT"
          echo "DIRECTORY TREE" >> "$OUTPUT"
          echo "==============================" >> "$OUTPUT"
          find . \
            -not -path './.git/*' \
            -not -path './gradle/*' \
            -not -path './.gradle/*' \
            -not -path '*/build/*' \
            -not -name '*.class' \
            -not -name '*.jar' \
            -not -name '*.aar' \
            | sort >> "$OUTPUT"

          echo "" >> "$OUTPUT"
          echo "==============================" >> "$OUTPUT"
          echo "FILE CONTENTS" >> "$OUTPUT"
          echo "==============================" >> "$OUTPUT"

          find . \
            -not -path './.git/*' \
            -not -path './gradle/*' \
            -not -path './.gradle/*' \
            -not -path '*/build/*' \
            -type f \
            | grep -E "\.($EXTS)$" \
            | sort \
            | while IFS= read -r file; do
                echo "" >> "$OUTPUT"
                echo "══════════════════════════════════════════════════════════" >> "$OUTPUT"
                echo "FILE: $file" >> "$OUTPUT"
                echo "══════════════════════════════════════════════════════════" >> "$OUTPUT"
                cat "$file" >> "$OUTPUT"
                echo "" >> "$OUTPUT"
              done

          echo "Done. Total size: $(wc -c < $OUTPUT) bytes"

      - name: Upload repo dump as artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-dump
          path: repo_dump.txt
          retention-days: 7
