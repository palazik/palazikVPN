name: Build palazikVPN

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle ──────────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # Regenerate gradlew + wrapper jar using the just-installed Gradle 8.9
      - name: Regenerate Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.9
          chmod +x gradlew

      # ── Android SDK + NDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      # ── ccache ──────────────────────────────────────────────────────────────
      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Cache ccache store
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}-
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --max-size=2G
          ccache --zero-stats
          echo "CCACHE_EXEC=$(which ccache)" >> $GITHUB_ENV
          echo "NDK_CCACHE=$(which ccache)"  >> $GITHUB_ENV

      # 🆕 FIX: Download libs and geo files with verification
      - name: Download libs and geo files
        run: |
          mkdir -p app/libs app/src/main/assets
          
          # Download libv2ray.aar
          curl -fL --retry 3 -o app/libs/libv2ray.aar \
            https://github.com/2dust/AndroidLibXrayLite/releases/download/v26.5.3/libv2ray.aar
          
          # Download geoip.dat (official v2fly source)
          curl -fL --retry 3 -o app/src/main/assets/geoip.dat \
            https://github.com/v2fly/geoip/releases/latest/download/geoip.dat
          
          # Download geosite.dat (official Loyalsoldier source - more reliable than dlc.dat)
          curl -fL --retry 3 -o app/src/main/assets/geosite.dat \
            https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          
          # Verify files exist and have content
          for file in app/libs/libv2ray.aar app/src/main/assets/geoip.dat app/src/main/assets/geosite.dat; do
            if [ ! -s "$file" ]; then
              echo "❌ Error: $file is missing or empty"
              exit 1
            fi
            echo "✓ $file ($(du -h $file | cut -f1))"
          done

      # 🆕 FIX: Verify assets are included in APK build
      - name: Pre-build verification
        run: |
          echo "=== Assets directory ==="
          ls -lh app/src/main/assets/
          echo "=== Libs directory ==="
          ls -lh app/libs/

      # ── Build ───────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache --stacktrace
      
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --no-configuration-cache --stacktrace

      - name: Print ccache stats
        run: ccache --show-stats

      # 🆕 FIX: Verify geodata in APK
      - name: Verify APK contents
        run: |
          echo "=== Checking debug APK for geodata ==="
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -E "geo(ip|site).dat" || echo "⚠️ Geodata not found in APK!"
          
          echo "=== Checking release APK for geodata ==="
          unzip -l app/build/outputs/apk/release/app-release-unsigned.apk | grep -E "geo(ip|site).dat" || echo "⚠️ Geodata not found in APK!"

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload Debug APK to Actions
        uses: actions/upload-artifact@v4
        with:
          name: palazikVPN-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK to Actions
        uses: actions/upload-artifact@v4
        with:
          name: palazikVPN-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Telegram ────────────────────────────────────────────────────────────
      - name: Resolve APK paths
        id: apks
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug   -name "*.apk" | head -1)
          REL_APK=$(find   app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "debug=$DEBUG_APK"  >> $GITHUB_OUTPUT
          echo "release=$REL_APK" >> $GITHUB_OUTPUT

      - name: Send Debug APK to Telegram
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          CAPTION="*palazikVPN* — Debug"$'\n'"Branch: \`${{ github.ref_name }}\`"$'\n'"Commit: \`${SHORT_SHA}\`"$'\n'"Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"${{ steps.apks.outputs.debug }}" \
            -F caption="${CAPTION}" \
            -F parse_mode="Markdown"

      - name: Send Release APK to Telegram
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          CAPTION="*palazikVPN* — Release (unsigned)"$'\n'"Branch: \`${{ github.ref_name }}\`"$'\n'"Commit: \`${SHORT_SHA}\`"$'\n'"Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"${{ steps.apks.outputs.release }}" \
            -F caption="${CAPTION}" \
            -F parse_mode="Markdown"
